# ملاحظة: هذا الملف مرجعي فقط.
# الإعداد الفعلي على VPS في: /etc/nginx/sites-enabled/games.conf
# الدومين: alothaimeen.xyz (HTTPS مُفعّل عبر Let's Encrypt / Certbot)
# الشهادة تنتهي: 2026-06-19 — التجديد تلقائي عبر certbot.timer

server {
    server_name 158.220.112.12 alothaimeen.xyz www.alothaimeen.xyz;

    # Landing page
    root /var/www/landing;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # horoof (هذا المشروع)
    location /horoof {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/alothaimeen.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alothaimeen.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP → HTTPS (managed by Certbot)
server {
    listen 80;
    server_name 158.220.112.12 alothaimeen.xyz www.alothaimeen.xyz;

    if ($host = www.alothaimeen.xyz) {
        return 301 https://$host$request_uri;
    }
    if ($host = alothaimeen.xyz) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
